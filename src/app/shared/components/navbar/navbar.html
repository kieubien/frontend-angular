<nav class="navbar">
    <div class="navbar__logo" routerLink="/">Blush<span>&</span>Bloom</div>

    <ul class="navbar__links" *ngIf="categories$ | async as allCats">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Trang chủ</a></li>
        
        <li *ngFor="let cat of getRootCategories(allCats)" class="navbar__item">
            <a [routerLink]="['/products']" [queryParams]="{category: cat.slug}" routerLinkActive="active">
                {{ cat.name }}
                <i class="bi bi-chevron-down ms-1" *ngIf="getChildren(allCats, cat.id).length > 0"></i>
            </a>

            <!-- Submenu if children exist -->
            <ul class="navbar__submenu" *ngIf="getChildren(allCats, cat.id).length > 0">
                <li *ngFor="let sub of getChildren(allCats, cat.id)">
                    <a [routerLink]="['/products']" [queryParams]="{category: sub.slug}">
                        {{ sub.name }}
                    </a>
                </li>
            </ul>
        </li>
    </ul>

    <div class="navbar__actions">
        <button class="navbar__icon-btn" title="Tìm kiếm"><i class="bi bi-search"></i></button>
        <button class="navbar__icon-btn" routerLink="/login" title="Tài khoản"><i class="bi bi-person"></i></button>
        <button class="navbar__icon-btn" routerLink="/cart" title="Giỏ hàng" style="position:relative">
            <i class="bi bi-bag"></i>
            <span class="navbar__badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </button>
        <button class="btn-register" routerLink="/register">Đăng ký</button>
    </div>
</nav>
