<nav class="navbar">
    <div class="navbar__logo" routerLink="/">Blush<span>&</span>Bloom</div>

    <ul class="navbar__links" *ngIf="categories$ | async as allCats">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Trang chủ</a></li>
        <li><a routerLink="/products" routerLinkActive="active">Sản phẩm</a></li>
        
        <li class="navbar__item">
            <a href="javascript:void(0)">
                Danh mục <i class="bi bi-chevron-down ms-1"></i>
            </a>

            <ul class="navbar__submenu">
                <li *ngFor="let cat of allCats" class="navbar__subitem">
                    <a [routerLink]="['/products']" [queryParams]="{category: cat.slug}">
                        {{ cat.name }}
                    </a>
                </li>
            </ul>
        </li>
    </ul>

    <div class="navbar__actions">
        <button class="navbar__icon-btn" title="Tìm kiếm"><i class="bi bi-search"></i></button>

        <button class="navbar__icon-btn text-primary" *ngIf="isLoggedIn && userRole === 'admin'" 
                routerLink="/admin" title="Trang quản trị">
            <i class="bi bi-shield-lock-fill"></i>
            <span class="ms-1 d-none d-md-inline" style="font-size: 14px;"></span>
        </button>

        <button class="navbar__icon-btn" routerLink="/login" title="Tài khoản" *ngIf="!isLoggedIn">
            <i class="bi bi-person"></i>
        </button>

        <ng-container *ngIf="isLoggedIn">
            <div class="navbar__user">
                <div class="navbar__user-info d-none d-lg-flex">
                    <span class="navbar__user-name">{{ userName }}</span>
                    <span class="navbar__user-role" *ngIf="userRole === 'admin'">(Quản trị viên)</span>
                </div>
                <button class="navbar__icon-btn ms-2" (click)="logout()" title="Đăng xuất">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </ng-container>

        <button class="navbar__icon-btn" routerLink="/cart" title="Giỏ hàng" style="position:relative">
            <i class="bi bi-bag"></i>
            <span class="navbar__badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </button>

        <button class="btn-register" routerLink="/register" *ngIf="!isLoggedIn">Đăng ký</button>
    </div>
</nav>
