<aside class="admin-sidebar d-flex flex-column">
  
  <div class="p-3 border-bottom">
    <h5 class="mb-0 text-pink fw-bold">
      Blush<span class="text-dark">&</span>Bloom
    </h5>
    <small class="text-muted">Admin Dashboard</small>
  </div>

  <div class="d-flex align-items-center gap-2 p-3 border-bottom">
    <div class="avatar">Admin</div>
    <div>
      <div class="fw-semibold">{{ userName }}</div>
      <small class="text-muted">Super Admin</small>
    </div>
  </div>

  <nav class="flex-grow-1 p-2">

    <div class="nav-section">Tổng quan</div>

    <a class="nav-link"
       routerLink="/admin"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a class="nav-link d-flex justify-content-between align-items-center"
       routerLink="/admin/orders"
       routerLinkActive="active">
      <span><i class="bi bi-box-seam"></i> Đơn hàng</span>
    </a>

    <div class="nav-section">Quản lý</div>

    <a class="nav-link"
       routerLink="/admin/products"
       routerLinkActive="active">
      <i class="bi bi-bag"></i> Sản phẩm
    </a>

    <a class="nav-link"
       routerLink="/admin/categories"
       routerLinkActive="active">
      <i class="bi bi-grid"></i> Danh mục
    </a>

    <div class="nav-section">Cá nhân</div>

    <a class="nav-link text-primary" routerLink="/">
      <i class="bi bi-shop"></i> Quay lại cửa hàng
    </a>

    <a class="nav-link"
       routerLink="/admin/users"
       routerLinkActive="active">
      <i class="bi bi-people"></i> Khách hàng
    </a>

  </nav>

  <div class="p-3 border-top mt-auto">
    <button class="btn btn-outline-danger w-100" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </button>
  </div>
</aside>
