<app-navbar></app-navbar>

<!-- STEP BAR -->
<div class="step-bar">

  <div class="step active">
    <div class="circle done">✓</div>
    Giỏ hàng
  </div>

  <div class="line"></div>

  <div class="step active">
    <div class="circle active">2</div>
    Giao hàng
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="circle">3</div>
    Thanh toán
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="circle">4</div>
    Xác nhận
  </div>

</div>

<div class="checkout-layout">

  <!-- LEFT -->
  <div>

    <!-- SHIPPING -->
    <div class="checkout-box">
      <div class="checkout-title">Thông tin giao hàng</div>

      <div class="form-group">
        <input type="text" placeholder="Họ và tên">
      </div>

      <div class="row-2">
        <div class="form-group">
          <input type="text" placeholder="Số điện thoại">
        </div>
        <div class="form-group">
          <input type="email" placeholder="Email">
        </div>
      </div>

      <div class="form-group">
        <input type="text" placeholder="Địa chỉ">
      </div>

      <div class="row-2">
        <div class="form-group">
          <select [(ngModel)]="selectedProvince" (change)="loadDistrict(selectedProvince)">
            <option value="">-- Chọn Tỉnh/Thành --</option>
            <option *ngFor="let p of provinces" [value]="p.code">
              {{ p.name }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <select [(ngModel)]="selectedDistrict">
            <option value="">-- Chọn Quận/Huyện --</option>
            <option *ngFor="let d of districts" [value]="d.code">
              {{ d.name }}
            </option>
          </select>
        </div>
      </div>

    </div>

    <!-- PAYMENT -->
    <div class="checkout-box">
      <div class="checkout-title">Phương thức thanh toán</div>

      <!-- COD -->
      <label class="payment-method">
        <div class="payment-left">
          <span class="payment-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor">
              <rect x="2" y="5" width="14" height="8" rx="2"/>
              <circle cx="9" cy="9" r="2"/>
            </svg>
          </span>
          COD
        </div>
        <input type="radio" name="pay" [(ngModel)]="paymentMethod" value="cod">
      </label>

      <!-- MOMO -->
      <label class="payment-method">
        <div class="payment-left">
          <span class="payment-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor">
              <rect x="2" y="4" width="14" height="10" rx="2"/>
            </svg>
          </span>
          MoMo
        </div>
        <input type="radio" name="pay" [(ngModel)]="paymentMethod" value="momo">
      </label>

      <!-- ZALO -->
      <label class="payment-method">
        <div class="payment-left">
          <span class="payment-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor">
              <rect x="5" y="2" width="8" height="14" rx="2"/>
            </svg>
          </span>
          ZaloPay
        </div>
        <input type="radio" name="pay" [(ngModel)]="paymentMethod" value="zalo">
      </label>

    </div>

  </div>

  <!-- RIGHT -->
  <div>
    <div class="summary-box">

      <div class="checkout-title">Đơn hàng của bạn</div>

      <div class="summary-row">
        <span>Tạm tính</span>
        <span>{{ formatPrice(subtotal) }}</span>
      </div>

      <div class="summary-row">
        <span>Phí ship</span>
        <span>
          {{ shippingFee === 0 ? 'Miễn phí' : formatPrice(shippingFee) }}
        </span>
      </div>

      <div class="summary-total">
        <span>Tổng</span>
        <span>{{ formatPrice(total) }}</span>
      </div>

      <button class="btn-place" (click)="placeOrder()">
        Đặt hàng
      </button>

    </div>
  </div>

</div>

<app-footer></app-footer>
